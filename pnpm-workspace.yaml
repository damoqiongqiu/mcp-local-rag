# Quarantine newly published versions for 24h; malware is usually detected and
# pulled within hours, so the cooldown avoids installing a fresh compromised release.
minimumReleaseAge: 1440

overrides:
  fast-uri: ">=3.1.4"

# Only packages whose build scripts we actually need are allowed to run.
# protobufjs is explicitly denied: its postinstall is a no-op for v7 (no
# versionScheme), so running it buys nothing and only widens the install-time
# attack surface. `false` (not removal) satisfies pnpm 11 strictDepBuilds.
allowBuilds:
  esbuild: true
  onnxruntime-node: true
  protobufjs: false
  sharp: true
  tree-sitter-go: true
  tree-sitter-java: true
  tree-sitter-javascript: true
  tree-sitter-python: true
  tree-sitter-rust: true
  tree-sitter-typescript: true
