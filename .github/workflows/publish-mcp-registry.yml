name: Publish to MCP Registry

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for GitHub OIDC
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set version
        run: |
          # For tag push: extract version from refs/tags/vX.Y.Z
          # For workflow_dispatch: read from package.json
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(jq -r .version package.json)
          fi
          echo "Publishing version: $VERSION"
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.tmp && mv server.tmp server.json

      - name: Wait for npm version
        run: |
          VERSION=$(jq -r .version server.json)
          # npm publish (triggered by the same tag) may still be in-flight.
          # Poll the registry until the version is visible, up to 2 minutes.
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://registry.npmjs.org/@damoqiongqiu/mcp-local-rag/$VERSION")
            if [ "$STATUS" = "200" ]; then
              echo "Version $VERSION found on npm"
              exit 0
            fi
            echo "Attempt $i/12: version $VERSION not yet on npm (HTTP $STATUS), waiting 10s..."
            sleep 10
          done
          echo "ERROR: npm version $VERSION still unavailable after 2 minutes"
          exit 1

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
